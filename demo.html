<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>E-commerce Support Chat</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; }
    input { padding: 8px; width: 70%; }
    button { padding: 8px 16px; cursor: pointer; }
    #response { 
      border: 1px solid #ccc; 
      padding: 12px; 
      margin-top: 20px; 
      background: #f9f9f9;
      white-space: pre-wrap;
      min-height: 60px;
    }
  </style>
</head>
<body>
  <h1>E-commerce Support Chat</h1>
  <div>
    <label>Your Question:</label><br>
    <input id="message" placeholder="e.g., Where is my order #12345?" />
    <button onclick="send()">Send</button>
  </div>
  <div id="response"></div>

  <script>
    const API_BASE = "http://127.0.0.1:9000";
    const TOKEN = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJjdXN0LTAwMSIsImV4cCI6OTk5OTk5OTk5OX0.m7ENsiUx38OS3qNlb7KNg9mP1P1TDHJMEBZxfEnxD-E";
    
    charAt  
    async function send() {
  const msg = document.getElementById("message").value;
  const resEl = document.getElementById("response");
  resEl.textContent = "Loading...";

  try {
    const res = await fetch(`${API_BASE}/api/v1/ecommerce/support`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${TOKEN}`
      },
      body: JSON.stringify({
        message: msg,
        customer_id: "demo-customer"
      })
    });

    const data = await res.json();

    if (!res.ok) {
      resEl.textContent =
        "Error " + res.status + ": " +
        (data.detail ? JSON.stringify(data.detail, null, 2) : JSON.stringify(data, null, 2));
      return;
    }

    resEl.textContent = data.reply || JSON.stringify(data, null, 2);
  } catch (err) {
    resEl.textContent = "Network error: " + (err?.message || String(err));
  }
}
  </script>
</body>
</html>
